name: glicera
description: "Aplikasi Skrining Diabetes Berbasis Analisis Citra Lidah"
publish_to: "none"

version: 1.0.0+3

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  animated_text_kit: ^4.2.2

  # === SUPABASE ===
  supabase_flutter: ^2.5.0

  # Deep Link & Connectivity
  app_links: ^6.3.3
  connectivity_plus: ^6.1.3
  intl: ^0.19.0

  # Image & Camera
  image_picker: ^1.1.2
  camera: ^0.11.0

  # ML
  tflite_flutter: ^0.12.1
  image: ^4.5.0

  # Chart
  fl_chart: ^1.2.0

  # State Management
  provider: ^6.1.1

  # Utils
  shared_preferences: ^2.2.2
  path_provider: ^2.1.5
  uuid: ^4.5.1
  
  # Notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/models/
    - assets/models/model_resnet50.tflite
    - assets/fonts/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins/Poppins-Bold.ttf
          weight: 700
    - family: HammersmithOne
      fonts:
        - asset: assets/fonts/Hammersmith_One/HammersmithOne-Regular.ttf